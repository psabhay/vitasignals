name: NeoHealthExport
options:
  bundleIdPrefix: com.neohealthexport
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  SWIFT_VERSION: "5.9"
  DEVELOPMENT_TEAM: U433W77Z44
schemes:
  NeoHealthExport:
    build:
      targets:
        NeoHealthExport: all
    test:
      targets:
        - NeoHealthExportTests
targets:
  NeoHealthExport:
    type: application
    platform: iOS
    sources:
      - NeoHealthExport
    settings:
      INFOPLIST_FILE: NeoHealthExport/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.abhaysingh.neohealthexport
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: 1
      DEVELOPMENT_TEAM: U433W77Z44
      CODE_SIGN_STYLE: Automatic
      TARGETED_DEVICE_FAMILY: "1"
      SUPPORTS_XR_DESIGNED_FOR: NO
    entitlements:
      path: NeoHealthExport/NeoHealthExport.entitlements
      properties:
        com.apple.developer.healthkit: true
  NeoHealthExportTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - NeoHealthExportTests
    settings:
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: NeoHealthExport
