name: VitaSignals
options:
  bundleIdPrefix: com.vitasignals
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  SWIFT_VERSION: "5.9"
  DEVELOPMENT_TEAM: U433W77Z44
schemes:
  VitaSignals:
    build:
      targets:
        VitaSignals: all
    test:
      targets:
        - VitaSignalsTests
targets:
  VitaSignals:
    type: application
    platform: iOS
    sources:
      - VitaSignals
    settings:
      INFOPLIST_FILE: VitaSignals/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.vitasignals.app
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: 1
      DEVELOPMENT_TEAM: U433W77Z44
      CODE_SIGN_STYLE: Automatic
      TARGETED_DEVICE_FAMILY: "1"
      SUPPORTS_XR_DESIGNED_FOR: NO
    entitlements:
      path: VitaSignals/VitaSignals.entitlements
      properties:
        com.apple.developer.healthkit: true
  VitaSignalsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - VitaSignalsTests
    settings:
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: VitaSignals
